<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Menu</title>
link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="gallery.css">
</head>

<body>

<h1>Our Menu</h1>

<div class="gallery">

    <div class="menu-item">
        <img src="bb.jpeg" alt="spaghetti">
        <div class="menu-content">
            <h3>Spaghetti</h3>
            <p class="price">₦2,500</p>
        </div>
    </div>

    <div class="menu-item">
        <img src="femoree-kn_ANxnwCQ0-unsplash.jpg" alt="vegetable-soup">
        <div class="menu-content">
            <h3>Vegetable Soup</h3>
            <p class="price">₦4,000</p>
        </div>
    </div>

    <div class="menu-item">
        <img src="bit.jpeg" alt="fried-rice">
        <div class="menu-content">
            <h3>Fried Rice</h3>
            <p class="price">&#8358 3,500</p>
        </div>
    </div>

    <div class="menu-item">
        <img src="k.jpg" alt="jellof-rice">
        <div class="menu-content">
            <h3>Jellof Rice</h3>
            <p class="price">₦2,500</p>
        </div>
    </div>

    <div class="menu-item">
        <img src="unsplash.jpg" alt="bitterleaf-soup">
        <div class="menu-content">
            <h3>Bitterleaf Soup</h3>
            <p class="price">₦5,000</p>
        </div>
    </div>

</div>

</html>
